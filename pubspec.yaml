name: tander_flutter_v3
description: "Tander — Social connection & wellness app for Filipino seniors 60+"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0

  # Real-time
  stomp_dart_client: ^2.0.0
  # Azure Web PubSub subscriber (Phase 5 native call signaling)
  web_socket_channel: ^3.0.0

  # WebRTC (legacy P2P stack; Phase 5 migrates to native Twilio SDK)
  flutter_webrtc: ^0.12.2

  # Push notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1
  flutter_local_notifications: ^18.0.1
  flutter_callkit_incoming: ^2.0.4+1

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Media
  image_picker: ^1.1.2
  record: 5.0.5
  just_audio: ^0.9.42
  camera: ^0.11.0+2
  flutter_image_compress: ^2.3.0

  # ML Kit (on-device OCR + document scanner for ID verification)
  google_mlkit_text_recognition: ^0.14.0
  cunning_document_scanner: ^1.2.3

  # Multipart uploads
  http_parser: ^4.0.0

  # UI
  phosphor_flutter: ^2.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Logging
  logger: ^2.5.0

  # Utilities
  intl: ^0.19.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  connectivity_plus: ^6.1.0
  wakelock_plus: ^1.2.8
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  record_platform_interface: 1.1.0
  record_linux: 0.7.1
  record_android: 1.2.1
  record_darwin: 1.1.1
  record_web: 1.1.2
  record_windows: 1.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
  fonts:
    - family: AppleChancery
      fonts:
        - asset: assets/fonts/AppleChancery.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/tander_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/tander_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
